# Tras cada push a `dev`: verifica build y crea/actualiza PR `dev` -> `main`.
name: Promote dev to main

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: promote-dev-to-main
  cancel-in-progress: true

jobs:
  build-and-open-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository (full history for merge)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Create or update PR dev -> main and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')"
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" \
              --title "Promote dev to main" \
              --body "Automated promotion PR from \`dev\` to \`main\` after successful build."
          else
            gh pr create \
              --base main \
              --head dev \
              --title "Promote dev to main" \
              --body "Automated promotion PR from \`dev\` to \`main\` after successful build."
            PR_NUMBER="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')"
          fi
          gh pr merge "$PR_NUMBER" --squash --auto

# Comprueba el build en PRs y pushes a ramas de trabajo.
name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [geme, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

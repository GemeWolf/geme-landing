name: Main Source Guard

on:
  pull_request:
    branches: [main]

jobs:
  guard-dev-source:
    runs-on: ubuntu-latest
    steps:
      - name: Allow only dev -> main PRs
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "Only PRs from dev to main are allowed."
            echo "Current source branch: ${{ github.head_ref }}"
            exit 1
          fi
          echo "Valid source branch: dev"
